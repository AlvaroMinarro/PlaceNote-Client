name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle shared JVM tests
        run: chmod +x gradlew && ./gradlew :shared:jvmTest --no-daemon
        working-directory: .
